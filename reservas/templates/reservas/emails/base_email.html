<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        /* Reinicios básicos para compatibilidad */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }

        /* Estilos del proyecto (con valores hardcodeados, sin variables) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
        }

        .wrapper {
            width: 100%;
            background-color: #f4f7f6;
        }

        .container {
            /* Esto es lo importante: padding y 100% de ancho */
            padding: 20px;
            width: 100%;
            box-sizing: border-box; /* Para que el padding no aumente el ancho */
        }

        .content {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
        }

        h1 { color: #0056b3; font-size: 24px; margin-top: 0; }
        p { font-size: 16px; line-height: 1.5; }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; }

        .boton {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007bff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body style="background-color: #f4f7f6; margin: 0 !important; padding: 0 !important;">
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" class="wrapper">
        <tr>
            <td class="container">
                <div class="content">
                    {% block content %}{% endblock %}
                </div>
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; text-align: center; color: #888888; font-size: 12px;">
                <p>Este es un correo automático. Por favor, no respondas a este mensaje.</p>
                <p>&copy; {% now "Y" %} Sistema de Reservas. Todos los derechos reservados.</p>
            </td>
        </tr>
    </table>
</body>
</html>
